<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calculator Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .chat { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 1.2rem; color: #333; }
    #messages { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; min-height: 300px; max-height: 500px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 8px 12px; border-radius: 6px; max-width: 85%; white-space: pre-wrap; font-size: 0.95rem; line-height: 1.4; }
    .user { background: #0070f3; color: white; align-self: flex-end; }
    .agent { background: #eee; color: #333; align-self: flex-start; }
    .form { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; outline: none; }
    input:focus { border-color: #0070f3; }
    button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat">
    <h1>Calculator Agent</h1>
    <div id="messages"></div>
    <div class="form">
      <input id="input" type="text" placeholder="e.g. what is 5 plus 3?" autofocus />
      <button id="btn" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    const SESSION_ID = 1;

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
      return div;
    }

    async function send() {
      const input = document.getElementById("input");
      const btn = document.getElementById("btn");
      const message = input.value.trim();
      if (!message) return;

      input.value = "";
      btn.disabled = true;
      addMessage(message, "user");

      const agentDiv = addMessage("", "agent");
      let buffer = "";

      const res = await fetch(`/messages?session_id=${SESSION_ID}&message=${encodeURIComponent(message)}`, {
        method: "POST",
        headers: { "Accept": "text/event-stream" },
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split("\n")) {
          if (line.startsWith("data: ")) {
            const data = line.slice(6);
            if (data === "[DONE]") break;
            try {
              const { delta } = JSON.parse(data);
              buffer += delta;
              agentDiv.textContent = buffer;
              agentDiv.scrollIntoView({ behavior: "smooth" });
            } catch {}
          }
        }
      }

      btn.disabled = false;
      input.focus();
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
